<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Shield body -->
  <path d="M200 30L310 80V170C310 230 260 275 200 290C140 275 90 230 90 170V80L200 30Z" fill="#E8734A" fill-opacity="0.12" stroke="#E8734A" stroke-width="2.5"/>
  <path d="M200 50L290 90V165C290 218 248 258 200 270C152 258 110 218 110 165V90L200 50Z" fill="#FFF5EE" stroke="#E8734A" stroke-width="1.5" stroke-opacity="0.4"/>
  
  <!-- Checkmark inside shield -->
  <path d="M165 155L190 180L240 130" stroke="#E8734A" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Alert bell - top right -->
  <g transform="translate(280, 45)">
    <circle cx="0" cy="0" r="22" fill="#E8734A" fill-opacity="0.15"/>
    <path d="M0-12C-6-12-10-8-10-2V2L-14 6V8H14V6L10 2V-2C10-8 6-12 0-12Z" fill="#E8734A" fill-opacity="0.8"/>
    <circle cx="0" cy="12" r="3" fill="#E8734A" fill-opacity="0.8"/>
    <circle cx="10" cy="-10" r="5" fill="#E85D2A"/>
    <text x="10" y="-7" text-anchor="middle" fill="white" font-size="7" font-weight="bold">!</text>
  </g>
  
  <!-- Phone outline - left side -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="45" height="80" rx="8" fill="white" stroke="#E8734A" stroke-width="1.5" stroke-opacity="0.3"/>
    <rect x="8" y="12" width="29" height="4" rx="2" fill="#E8734A" fill-opacity="0.15"/>
    <rect x="8" y="20" width="20" height="4" rx="2" fill="#E8734A" fill-opacity="0.1"/>
    <rect x="8" y="30" width="29" height="20" rx="3" fill="#E8734A" fill-opacity="0.08"/>
    <circle cx="22.5" cy="68" r="4" fill="#E8734A" fill-opacity="0.12"/>
  </g>
  
  <!-- Scanning lines -->
  <line x1="130" y1="100" x2="160" y2="100" stroke="#E8734A" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="240" y1="100" x2="270" y2="100" stroke="#E8734A" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="130" y1="200" x2="160" y2="200" stroke="#E8734A" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  <line x1="240" y1="200" x2="270" y2="200" stroke="#E8734A" stroke-width="1.5" stroke-opacity="0.2" stroke-dasharray="4 3"/>
  
  <!-- Decorative dots -->
  <circle cx="330" cy="140" r="3" fill="#E8734A" fill-opacity="0.15"/>
  <circle cx="345" cy="130" r="2" fill="#E8734A" fill-opacity="0.1"/>
  <circle cx="340" cy="155" r="2.5" fill="#E8734A" fill-opacity="0.12"/>
  <circle cx="60" cy="50" r="3" fill="#E8734A" fill-opacity="0.12"/>
  <circle cx="75" cy="65" r="2" fill="#E8734A" fill-opacity="0.08"/>
</svg>
